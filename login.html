<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vivid Windows — Sign In</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0b0c14;
    --surface:   #0f1020;
    --surface2:  #13152a;
    --border:    #1e2030;
    --teal:      #00e5be;
    --blue:      #4d9fff;
    --amber:     #ffc947;
    --red:       #ff5f6d;
    --text:      #e8eaf6;
    --text-dim:  #6b7280;
    --text-muted:#3d4252;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 48px 40px 40px;
    width: 360px;
    text-align: center;
    box-shadow: 0 24px 60px rgba(0,0,0,0.5);
  }

  .logo-mark {
    width: 52px;
    height: 52px;
    background: linear-gradient(135deg, var(--teal) 0%, var(--blue) 100%);
    border-radius: 14px;
    margin: 0 auto 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    font-weight: 900;
    color: var(--bg);
    letter-spacing: -1px;
  }

  .title {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 0.08em;
    color: var(--text);
    margin-bottom: 4px;
  }

  .title span {
    color: var(--teal);
  }

  .subtitle {
    font-size: 13px;
    color: var(--text-dim);
    margin-bottom: 36px;
  }

  .divider {
    height: 1px;
    background: var(--border);
    margin-bottom: 32px;
  }

  .sign-in-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    width: 100%;
    padding: 13px 20px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    text-decoration: none;
    transition: border-color 0.15s, background 0.15s;
  }

  .sign-in-btn:hover {
    border-color: var(--teal);
    background: rgba(0, 229, 190, 0.06);
  }

  .sign-in-btn svg {
    flex-shrink: 0;
  }

  .restriction {
    margin-top: 20px;
    font-size: 12px;
    color: var(--text-muted);
  }

  .restriction span {
    color: var(--amber);
  }

  /* subtle animated gradient border on card */
  @keyframes borderGlow {
    0%   { box-shadow: 0 24px 60px rgba(0,0,0,0.5), 0 0 0 0px rgba(0,229,190,0); }
    50%  { box-shadow: 0 24px 60px rgba(0,0,0,0.5), 0 0 20px 1px rgba(0,229,190,0.08); }
    100% { box-shadow: 0 24px 60px rgba(0,0,0,0.5), 0 0 0 0px rgba(0,229,190,0); }
  }

  .card { animation: borderGlow 4s ease-in-out infinite; }
</style>
</head>
<body>

<div class="card">
  <div class="logo-mark">V</div>
  <div class="title">VIVID <span>WINDOWS</span></div>
  <div class="subtitle">Sales Dashboard</div>
  <div class="divider"></div>

  <a class="sign-in-btn" href="/oauth/start">
    <!-- Google "G" logo -->
    <svg width="20" height="20" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
      <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
      <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
      <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
      <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
      <path fill="none" d="M0 0h48v48H0z"/>
    </svg>
    Sign in with Google
  </a>

  <div class="restriction">
    Access restricted to <span>@vividwindows.com</span> accounts
  </div>
</div>

</body>
</html>
